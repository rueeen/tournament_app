{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<h1 class="h4 mb-3">{{ title }}</h1>
<div class="card bg-black border-secondary p-3">
<form method="post" enctype="multipart/form-data">{% csrf_token %}
  {{ form|crispy }}
  <button class="btn btn-success">Guardar</button>
</form>
</div>
{% endblock %}
