{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<h1 class="h4 mb-3">{{ title }}</h1>
<div class="card bg-black border-secondary p-3">
  <div class="mb-3">
    <label for="commander-search" class="form-label">Buscar comandante en Scryfall</label>
    <div class="input-group">
      <input id="commander-search" type="text" class="form-control" placeholder="Ej: Atraxa">
      <button id="commander-search-btn" type="button" class="btn btn-outline-info">Buscar</button>
    </div>
    <small class="text-secondary">Selecciona una carta para autocompletar nombre, colores y sugerencia de tierras.</small>
  </div>

  <div id="commander-search-results" class="list-group mb-3"></div>

  <div id="commander-preview" class="mb-3 d-none">
    <div class="d-flex gap-3 align-items-start">
      <img id="commander-preview-image" src="" alt="Comandante" style="width:140px; border-radius:0.5rem;">
      <div>
        <h2 id="commander-preview-name" class="h6 mb-2"></h2>
        <div id="commander-land-suggestion" class="mb-0 small text-secondary"></div>
      </div>
    </div>
  </div>

  <form method="post">{% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-success">Guardar</button>
  </form>
</div>

<script>
(function () {
  const searchInput = document.getElementById('commander-search');
  const searchButton = document.getElementById('commander-search-btn');
  const resultsContainer = document.getElementById('commander-search-results');
  const previewContainer = document.getElementById('commander-preview');
  const previewImage = document.getElementById('commander-preview-image');
  const previewName = document.getElementById('commander-preview-name');
  const previewLands = document.getElementById('commander-land-suggestion');
  const colorNameByCode = {
    W: 'Blanco',
    U: 'Azul',
    B: 'Negro',
    R: 'Rojo',
    G: 'Verde',
  };
  const basicLandByCode = {
    W: { name: 'Planicie', symbol: 'W' },
    U: { name: 'Isla', symbol: 'U' },
    B: { name: 'Pantano', symbol: 'B' },
    R: { name: 'Montaña', symbol: 'R' },
    G: { name: 'Bosque', symbol: 'G' },
  };

  function buildLandSuggestion(colorIdentity) {
    if (!colorIdentity.length) {
      return [{ land: 'Yermo', count: 36, symbol: 'C' }];
    }
    const perColor = Math.floor(36 / colorIdentity.length);
    const remainder = 36 % colorIdentity.length;
    return colorIdentity.map((color, index) => ({
      land: basicLandByCode[color]?.name || 'Tierra',
      symbol: basicLandByCode[color]?.symbol || 'C',
      count: perColor + (index < remainder ? 1 : 0),
    }));
  }

  const deckNameField = document.getElementById('id_name');
  const coverImageUrlField = document.getElementById('id_cover_image_url');

  function renderResults(results) {
    resultsContainer.innerHTML = '';

    if (!results.length) {
      const empty = document.createElement('div');
      empty.className = 'text-secondary small';
      empty.textContent = 'No encontramos comandantes con ese nombre.';
      resultsContainer.appendChild(empty);
      return;
    }

    results.forEach((result) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'list-group-item list-group-item-action bg-dark text-light border-secondary';
      button.innerHTML = `<strong>${result.name}</strong><br><span class="small">Identidad: ${result.color_identity.join(', ') || 'Incolora'}</span>`;
      button.addEventListener('click', () => applyCommander(result));
      resultsContainer.appendChild(button);
    });
  }

  function applyCommander(result) {
    if (deckNameField) {
      deckNameField.value = result.name;
    }
    if (coverImageUrlField) {
      coverImageUrlField.value = result.image_url || '';
    }

    const selectedColorNames = new Set(
      (result.color_identity || []).map((code) => colorNameByCode[code]).filter(Boolean),
    );
    document.querySelectorAll('input[name="colors"]').forEach((checkbox) => {
      const label = document.querySelector(`label[for="${checkbox.id}"]`);
      const labelText = (label?.textContent || '').trim();
      checkbox.checked = selectedColorNames.has(labelText);
    });

    if (result.image_url) {
      previewImage.src = result.image_url;
      previewImage.classList.remove('d-none');
    } else {
      previewImage.classList.add('d-none');
    }

    previewName.textContent = result.name;
    const landItems = result.land_suggestion
      .map((item) => `<span class="land-pill"><img src="https://svgs.scryfall.io/card-symbols/${item.symbol}.svg" alt="${item.land}" class="mana-symbol">${item.count} ${item.land}</span>`)
      .join('');
    previewLands.innerHTML = `<span class="d-block mb-1">Tierras base sugeridas (36):</span><div class="land-pill-list">${landItems}</div>`;
    previewContainer.classList.remove('d-none');
  }

  async function runSearch() {
    const query = searchInput.value.trim();
    if (query.length < 2) {
      resultsContainer.innerHTML = '<div class="text-secondary small">Escribe al menos 2 caracteres para buscar.</div>';
      return;
    }

    resultsContainer.innerHTML = '<div class="text-secondary small">Buscando...</div>';

    const scryfallQuery = `${query} type:legendary (type:creature or (type:planeswalker oracle:"can be your commander")) game:paper`;
    const response = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(scryfallQuery)}`);
    const payload = await response.json();
    const results = (payload.data || []).slice(0, 8).map((card) => {
      const imageFromFace = (card.card_faces || []).find((face) => face.image_uris)?.image_uris;
      return {
        name: card.name,
        color_identity: card.color_identity || [],
        image_url: card.image_uris?.large || card.image_uris?.normal || card.image_uris?.art_crop || imageFromFace?.large || imageFromFace?.normal || imageFromFace?.art_crop || '',
        land_suggestion: buildLandSuggestion(card.color_identity || []),
      };
    });
    renderResults(results);
  }

  searchButton.addEventListener('click', runSearch);
  searchInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      runSearch();
    }
  });
})();
</script>
{% endblock %}
