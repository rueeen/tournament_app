<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MTG Match Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">⚔️ MTG Arena Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      {% if user.is_authenticated %}
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'deck_list' %}">Mis mazos</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'match_list' %}">Mis partidas</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'invitation_list' %}">Invitaciones</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'ranking_dashboard' %}">Rankings</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Perfil</a></li>
      </ul>
      <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Salir</a>
      {% endif %}
    </div>
  </div>
</nav>
<main class="container py-3">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
